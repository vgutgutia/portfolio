  <style id="gpu-status-css">
  .gpu-status-pill{display:inline-flex;align-items:center;justify-content:center;min-width:128px;gap:.45rem;padding:.28rem .7rem;border-radius:999px;border:1px solid #2a2a2a;background:#181818;font-size:.72rem;font-weight:600;letter-spacing:.03em;cursor:default;white-space:nowrap}
  .gpu-status-pill .gd{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#444}
  .gpu-status-pill .gd.ready{background:#4ade80;box-shadow:0 0 5px #4ade8077;animation:gpuGlow 2s ease-in-out infinite}
  .gpu-status-pill .gd.busy{background:#fbbf24;box-shadow:0 0 5px #fbbf2477;animation:gpuGlow 1s ease-in-out infinite}
  .gpu-status-pill .gt{color:#555}
  .gpu-status-pill .gt.ready{color:#4ade80}
  .gpu-status-pill .gt.busy{color:#fbbf24}
  @keyframes gpuGlow{0%,100%{opacity:1}50%{opacity:.35}}
  </style>

<script id="gpu-status-js">
(function(){
  function upd(){
    fetch('https://spbdatascience.org/api/gpu-status')
      .then(function(r){return r.json();})
      .then(function(d){
        var s=d.status||'offline';
        var dot=document.getElementById('gpuDot');
        var txt=document.getElementById('gpuTxt');
        dot.className='gd '+(s==='ready'||s==='busy'?s:'');
        txt.className='gt '+(s==='ready'||s==='busy'?s:'');
        txt.textContent=s==='ready'?'GPU Online':s==='busy'?'GPU Busy':'GPU Offline';
      }).catch(function(){
        document.getElementById('gpuTxt').textContent='GPU Offline';
      });
  }
  upd();setInterval(upd,20000);
})();
</script>
